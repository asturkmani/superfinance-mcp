app = 'superfinance-mcp'
primary_region = 'ams'

[build]

[mounts]
  source = "superfinance_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  # Always-on: auto_stop disabled, auto_start kept as a safety net.
  # Cold-starts caused "Proxy is having trouble reaching app" errors
  # for MCP clients (Claude Desktop) which marked the connector broken.
  # Note: min_machines_running only applies when auto_stop is enabled,
  # so it's redundant here but kept for clarity.
  auto_stop_machines = "off"
  auto_start_machines = true
  processes = ["app"]

[[http_service.checks]]
  interval = "300s"
  timeout = "10s"
  grace_period = "30s"
  method = "GET"
  path = "/health"

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
