app = 'superfinance-mcp'
primary_region = 'ams'

[build]

[mounts]
  source = "superfinance_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  # Keep one machine always running. Auto-stop causes ~5-10s cold-start
  # windows where Fly proxy returns "Proxy is having trouble reaching app"
  # to MCP clients (Claude Desktop), which marks the connector broken.
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[http_service.checks]]
  interval = "300s"
  timeout = "10s"
  grace_period = "30s"
  method = "GET"
  path = "/health"

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
