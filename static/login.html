<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vault — Connect</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif;
            background: #0f0f23; color: #e2e8f0;
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .card {
            background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 16px;
            padding: 40px; max-width: 400px; width: 100%; margin: 20px;
        }
        .logo { font-size: 24px; font-weight: 700; margin-bottom: 24px; }
        .logo span { color: #4ade80; }
        
        /* Tabs */
        .tabs { display: flex; gap: 0; margin-bottom: 28px; border-bottom: 1px solid #2a2a4a; }
        .tab {
            flex: 1; padding: 12px; text-align: center; font-size: 15px; font-weight: 600;
            cursor: pointer; color: #64748b; border-bottom: 2px solid transparent;
            transition: all 0.2s; background: none; border-top: none; border-left: none; border-right: none;
        }
        .tab.active { color: #4ade80; border-bottom-color: #4ade80; }
        .tab:hover { color: #94a3b8; }
        
        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 13px; color: #94a3b8; margin-bottom: 6px; font-weight: 500; }
        input {
            width: 100%; padding: 12px 16px; background: #0f0f23;
            border: 1px solid #2a2a4a; border-radius: 10px; color: #e2e8f0;
            font-size: 15px; outline: none; transition: border-color 0.2s;
        }
        input:focus { border-color: #4ade80; }
        input::placeholder { color: #475569; }
        button[type="submit"] {
            width: 100%; padding: 14px; background: #4ade80; color: #0f0f23;
            border: none; border-radius: 10px; font-size: 16px; font-weight: 600;
            cursor: pointer; margin-top: 8px;
        }
        button[type="submit"]:hover { background: #22c55e; }
        button[type="submit"]:disabled { background: #2a2a4a; color: #64748b; cursor: not-allowed; }
        .error { color: #f87171; font-size: 14px; margin-top: 12px; display: none; }
        .panel { display: none; }
        .panel.active { display: block; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo"><span>⚡</span> Vault</div>
        
        <div class="tabs">
            <button class="tab active" onclick="showTab('signin')">Sign In</button>
            <button class="tab" onclick="showTab('signup')">Sign Up</button>
        </div>
        
        <!-- Sign In -->
        <div class="panel active" id="signin-panel">
            <form id="signin-form">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="si-email" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="si-password" placeholder="Your password" required>
                </div>
                <button type="submit" id="si-btn">Sign In</button>
                <div class="error" id="si-error"></div>
            </form>
        </div>
        
        <!-- Sign Up -->
        <div class="panel" id="signup-panel">
            <form id="signup-form">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="su-email" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" id="su-name" placeholder="Your name">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="su-password" placeholder="Choose a password" required minlength="6">
                </div>
                <button type="submit" id="su-btn">Create Account</button>
                <div class="error" id="su-error"></div>
            </form>
        </div>
    </div>
    
    <script>
        const params = new URLSearchParams(window.location.search);
        const requestId = params.get('request_id');
        
        function showTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.querySelector(`.tab:nth-child(${tab === 'signin' ? 1 : 2})`).classList.add('active');
            document.getElementById(`${tab === 'signin' ? 'signin' : 'signup'}-panel`).classList.add('active');
        }
        
        async function doAuth(action, email, password, name) {
            const res = await fetch('/vault-auth', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ request_id: requestId, email, password, name, action })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || 'Failed');
            window.location.href = data.redirect_url;
        }
        
        document.getElementById('signin-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('si-btn');
            const err = document.getElementById('si-error');
            err.style.display = 'none';
            btn.disabled = true; btn.textContent = 'Signing in...';
            try {
                await doAuth('login', 
                    document.getElementById('si-email').value,
                    document.getElementById('si-password').value);
            } catch (ex) {
                err.textContent = ex.message; err.style.display = 'block';
                btn.disabled = false; btn.textContent = 'Sign In';
            }
        });
        
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('su-btn');
            const err = document.getElementById('su-error');
            err.style.display = 'none';
            btn.disabled = true; btn.textContent = 'Creating account...';
            try {
                await doAuth('signup',
                    document.getElementById('su-email').value,
                    document.getElementById('su-password').value,
                    document.getElementById('su-name').value || undefined);
            } catch (ex) {
                err.textContent = ex.message; err.style.display = 'block';
                btn.disabled = false; btn.textContent = 'Create Account';
            }
        });
    </script>
</body>
</html>
